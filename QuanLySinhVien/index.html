<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Sinh viên</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>StudentManager</span>
            </div>
            <div class="header-actions">
                <button id="loadSampleBtn" class="btn btn-outline">
                    <i class="fas fa-database"></i> Dữ liệu mẫu
                </button>
                <button id="exportExcelBtn" class="btn btn-success">
                    <i class="fas fa-file-excel"></i> Xuất Excel
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon bg-blue"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <h3>Tổng sinh viên</h3>
                        <p id="totalStudents">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-green"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <h3>Sinh viên Đạt</h3>
                        <p id="passedStudents">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-red"><i class="fas fa-times-circle"></i></div>
                    <div class="stat-info">
                        <h3>Cần cố gắng</h3>
                        <p id="failedStudents">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-purple"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-info">
                        <h3>Điểm TB chung</h3>
                        <p id="averageGPA">0.00</p>
                    </div>
                </div>
            </div>

            <div class="content-grid">
                <!-- Left Column: Form -->
                <div class="form-panel card">
                    <div class="card-header">
                        <h2><i class="fas fa-user-edit"></i> Thông tin sinh viên</h2>
                    </div>
                    <div class="card-body">
                        <form id="studentForm">
                            <div class="form-group">
                                <label for="studentId">Mã sinh viên</label>
                                <input type="text" id="studentId" placeholder="VD: SV001" required>
                            </div>
                            <div class="form-group">
                                <label for="studentName">Họ và tên</label>
                                <input type="text" id="studentName" placeholder="Nhập họ tên..." required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="studentDob">Ngày sinh</label>
                                    <input type="date" id="studentDob" required>
                                </div>
                                <div class="form-group">
                                    <label for="studentGender">Giới tính</label>
                                    <select id="studentGender" required>
                                        <option value="Nam">Nam</option>
                                        <option value="Nữ">Nữ</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="studentClass">Lớp</label>
                                    <input type="text" id="studentClass" placeholder="VD: CNTT-K65" required>
                                </div>
                                <div class="form-group">
                                    <label for="studentGPA">Điểm TB (GPA)</label>
                                    <input type="number" id="studentGPA" min="0" max="10" step="0.1" placeholder="0.0 - 10.0" required>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="button" id="resetBtn" class="btn btn-secondary">Làm mới</button>
                                <button type="submit" id="submitBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Thêm sinh viên</button>
                            </div>
                        </form>
                    </div>
                    
                    <!-- System Info (Debug) -->
                    <div class="system-info">
                        <h4><i class="fas fa-server"></i> Trạng thái Mảng động</h4>
                        <div class="info-row">
                            <span>Size: <strong id="arraySize">0</strong></span>
                            <span>Capacity: <strong id="arrayCapacity">0</strong></span>
                            <span>Resizes: <strong id="resizeCount">0</strong></span>
                        </div>
                    </div>
                </div>

                <!-- Right Column: List -->
                <div class="list-panel card">
                    <div class="card-header flex-between">
                        <h2><i class="fas fa-list"></i> Danh sách sinh viên</h2>
                        <div class="toolbar">
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" id="searchInput" placeholder="Tìm kiếm...">
                            </div>
                        </div>
                    </div>
                    
                    <div class="filter-bar">
                        <div class="filter-group">
                            <label>Lọc lớp:</label>
                            <select id="filterClass">
                                <option value="">Tất cả</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Sắp xếp:</label>
                            <div class="sort-control">
                                <select id="sortBy">
                                    <option value="maSV">Mã SV</option>
                                    <option value="hoTen">Tên</option>
                                    <option value="diemTB">Điểm GPA</option>
                                    <option value="tenLop">Lớp</option>
                                    <option value="ngaySinh">Ngày sinh</option>
                                    <option value="gioiTinh">Giới tính</option>
                                    <option value="xepLoai">Xếp loại</option>
                                </select>
                                <button id="sortOrder" class="btn-icon" title="Đổi chiều sắp xếp">
                                    <i class="fas fa-sort-amount-down"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>STT</th>
                                    <th>Mã SV</th>
                                    <th>Họ và tên</th>
                                    <th>Ngày sinh</th>
                                    <th>Giới tính</th>
                                    <th>Lớp</th>
                                    <th>GPA</th>
                                    <th>Xếp loại</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody">
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination">
                        <div class="page-info">
                            Hiển thị 
                            <select id="itemsPerPage">
                                <option value="5">5</option>
                                <option value="10" selected>10</option>
                                <option value="20">20</option>
                            </select>
                            dòng/trang
                        </div>
                        <div class="page-controls">
                            <button id="prevPage" class="btn-page"><i class="fas fa-chevron-left"></i></button>
                            <span class="page-numbers">Trang <span id="currentPage">1</span> / <span id="totalPages">1</span></span>
                            <button id="nextPage" class="btn-page"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Confirm Delete -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Xác nhận</h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button id="cancelModal" class="btn btn-secondary">Hủy bỏ</button>
                <button id="confirmModalBtn" class="btn btn-danger">Xóa ngay</button>
            </div>
            <span id="closeModal" class="close-btn">&times;</span>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Scripts - Thứ tự tải theo dependency -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- 1. Cấu trúc dữ liệu: Mảng động -->
    <script src="DynamicArray.js"></script>
    <!-- 2. Đối tượng: Sinh viên -->
    <script src="Student.js"></script>
    <!-- 3. Dữ liệu mẫu -->
    <script src="data.js"></script>
    <!-- 4. Logic nghiệp vụ: CRUD, Search, Sort -->
    <script src="StudentManager.js"></script>
    <!-- 5. Giao diện đồ họa: Render, Events -->
    <script src="UIController.js"></script>
    <!-- 6. Khởi tạo ứng dụng -->
    <script src="main.js"></script>
</body>
</html>
